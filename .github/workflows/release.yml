name: Release

# Publish a GitHub Release whenever a version tag (vX.Y.Z) is pushed.
# The catalog is versioned as a whole; consumers (e.g. the Fastfold Agent CLI)
# read the latest release tag to surface a skills version and an upgrade notice.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify tag matches VERSION
        run: |
          tag="${GITHUB_REF_NAME#v}"
          file="$(tr -d '[:space:]' < VERSION)"
          if [ "$tag" != "$file" ]; then
            echo "Tag ($tag) does not match VERSION file ($file)." >&2
            exit 1
          fi

      - name: Extract changelog section
        id: changelog
        run: |
          version="${GITHUB_REF_NAME#v}"
          notes="$(awk -v ver="$version" '
            $0 ~ "^## \\[" ver "\\]" {flag=1; next}
            flag && /^## \[/ {exit}
            flag {print}
          ' CHANGELOG.md)"
          if [ -z "$notes" ]; then
            notes="Release ${GITHUB_REF_NAME}"
          fi
          {
            echo "notes<<EOF"
            echo "$notes"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: ${{ steps.changelog.outputs.notes }}
